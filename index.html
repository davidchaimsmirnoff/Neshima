<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synchronized Breathing</title>
<style>
  body { font-family: Arial; text-align: center; margin-top: 100px; background: #f0f8ff; }
  #counter { font-size: 80px; margin: 50px 0; }
  button { padding: 15px 30px; font-size: 24px; cursor: pointer; border-radius: 10px; border: none; background: #4CAF50; color: white; }
  button:hover { background: #45a049; }
</style>
</head>
<body>

<h1>Synchronized Breathing</h1>
<div id="counter">0</div>
<button id="startBtn">Start Breathing</button>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>



  <script>
// Your Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDbRSZ4eyTcl7gn-f5jMBLuplvafMxr8y4",
  authDomain: "brethingsynchronizer.firebaseapp.com",
  projectId: "brethingsynchronizer",
  storageBucket: "brethingsynchronizer.firebasestorage.app",
  messagingSenderId: "469175654765",
  appId: "1:469175654765:web:f2ddc332865b919172e264",
  measurementId: "G-HWGG5M0LX7"
};

// Initialize Firebase (compat style)
firebase.initializeApp(firebaseConfig);
// Optional: firebase.analytics();  ← remove or keep if you really need it

const db = firebase.database();

const counter = document.getElementById('counter');
const button = document.getElementById('startBtn');

// Listen for timer updates from Firebase
db.ref('breathingTimer').on('value', (snapshot) => {
  const startTime = snapshot.val();
  if (startTime) {
    updateCounter(startTime);
  } else {
    counter.textContent = "0";
  }
});

// When button is clicked, broadcast the start time
button.addEventListener('click', () => {
  button.disabled = true;
  button.textContent = "Started";
  const now = Date.now();
  db.ref('breathingTimer').set(now);
  setTimeout(() => {
    button.disabled = false;
    button.textContent = "Start Breathing";
  }, 4000); // re-enable after one cycle
});

// Update the breathing counter (1 → 2 → 3 → 4 → 1 → ...)
let intervalId;
function updateCounter(startTime) {
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000); // seconds
    const count = (elapsed % 4) + 1; // 1,2,3,4 cycle
    counter.textContent = count;
  }, 100); // smooth updates
}
</script>

</body>
</html>
