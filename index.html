  // ===== 3. Listen for timer updates =====
  db.ref('breathingTimer').on('value', (snapshot) => {
    const startTime = snapshot.val();
    if (startTime) {
      updateCounter(startTime);
    } else {
      counter.textContent = "0";
    }
  });

  // ===== 4. When button is clicked, start timer =====
  button.addEventListener('click', () => {
    const now = Date.now();
    db.ref('breathingTimer').set(now); // Write start time to Firebase
  });

  // ===== 5. Update the counter based on shared start time =====
  let intervalId;
  function updateCounter(startTime) {
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000); // seconds
      const count = elapsed % 4 + 1; // cycle 1-4
      counter.textContent = count;
    }, 100); // update every 0.1s for smoothness
  }
</script>
